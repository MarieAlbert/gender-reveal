<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La révélation de Marie & Albert</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Librairie Confetti (CDN sans framework) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Script principal -->
    <script src="script.js" defer></script>
</head>
<body>

    <!-- VUE ACCUEIL -->
    <section id="home-view" class="view active">
        <div class="card">
            <h1>Marie <span>&</span> Albert</h1>
            <p class="subtitle">Nous avons une merveilleuse nouvelle à vous annoncer...</p>
            <p>Faites tourner la roue pour découvrir notre secret.</p>
            <button id="btn-start" class="btn-primary">Découvrir notre secret</button>
        </div>
    </section>

    <!-- VUE JEU -->
    <section id="game-view" class="view hidden">
        <div class="card game-card">
            
            <div class="wheel-container">
                <div class="pointer"></div>
                <!-- Image de la roue depuis le dossier assets -->
                <img src="assets/images/wheel.png" alt="Roue du reveal" id="wheel-img" class="wheel">
            </div>
            
            <button id="btn-spin" class="btn-primary">Faire tourner</button>
        </div>
    </section>

    <!-- MODAL INTERMEDIAIRE (Tours 1 & 2) -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div id="modal-emoji" class="modal-emoji"></div>
            <h3 id="modal-title"></h3>
            <p id="modal-text"></p>
            <button id="btn-next-turn" class="btn-secondary">Continuer</button>
        </div>
    </div>

    <!-- VUE REVEAL (Animation finale) -->
    <section id="reveal-view" class="view hidden dark-mode">
        <div class="reveal-container">
            <!-- Animation Enveloppe -->
            <div class="envelope-wrapper" id="envelope-wrapper">
                <div class="envelope">
                    <div class="envelope-flap" id="envelope-flap"></div>
                    <div class="envelope-back"></div>
                    <div class="envelope-card" id="envelope-card">
                        <h2>C'est une fille !</h2>
                        <p>Notre petite fille arrivera en fin d'année.</p>
                        <p class="thanks">Merci de partager ce moment avec nous ♥</p>
                        <p class="signature">Marie & Albert</p>
                    </div>
                    <div class="envelope-front"></div>
                </div>
            </div>
        </div>
        
        <!-- Bouton pour revoir l'animation (apparaît après la carte) -->
        <div id="replay-container" class="replay-container hidden">
            <button id="btn-replay" class="btn-secondary inverse">Revoir l'animation</button>
        </div>
    </section>

</body>
</html>
